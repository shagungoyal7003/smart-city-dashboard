<!DOCTYPE html>
<html>
<head>
    <title>Smart City Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h1 class="text-center">Smart City Dashboard</h1>

<a href="/fetch/" class="btn btn-primary mb-3">Fetch Latest Data</a>

<table class="table table-bordered">
<tr>
    <th>City</th>
    <th>Temperature</th>
    <th>Humidity</th>
    <th>Time</th>
</tr>

{% for d in data %}
<tr>
    <td>{{ d.city }}</td>
    <td>{{ d.temperature }}</td>
    <td>{{ d.humidity }}</td>
    <td>{{ d.timestamp }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
